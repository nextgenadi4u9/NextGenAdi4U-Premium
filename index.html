<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGenAdi4U - Premium Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Premium Golden & White Theme Elements */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15);
        }

        .text-gold { color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; }
        .border-gold { border-color: #D4AF37; }
        
        .btn-gold {
            background: linear-gradient(45deg, #D4AF37, #FFDF73);
            color: #fff;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        .input-field {
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
            outline: none;
        }

        /* Custom Toast Notification System */
        #custom-toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .custom-toast {
            background: #fff;
            border-left: 4px solid #D4AF37;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            transform: translateX(100%);
        }
        .toast-error { border-left-color: #ef4444; }
        .toast-success { border-left-color: #22c55e; }

        @keyframes slideIn {
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }

        .form-container {
            transition: all 0.4s ease-in-out;
        }
        .hidden-form {
            display: none;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="custom-toast-container"></div>

    <div class="glass-card w-full max-w-md mx-4 rounded-2xl p-8 relative overflow-hidden">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">NextGen<span class="text-gold">Adi4U</span></h1>
            <p class="text-gray-500 text-sm mt-1">Premium Digital Assets & Codes</p>
        </div>

        <div id="login-form" class="form-container">
            <h2 class="text-xl font-semibold mb-6 text-gray-700">Welcome Back</h2>
            <div class="space-y-4">
                <div>
                    <input type="email" id="login-email" placeholder="Email Address" class="input-field w-full px-4 py-3 rounded-lg bg-gray-50">
                </div>
                <div>
                    <input type="password" id="login-password" placeholder="Password" class="input-field w-full px-4 py-3 rounded-lg bg-gray-50">
                </div>
                <div class="flex justify-end">
                    <button onclick="handleForgotPassword()" class="text-sm text-gold hover:underline">Forgot Password?</button>
                </div>
                <button id="btn-login" class="btn-gold w-full py-3 rounded-lg font-semibold text-lg mt-2 shadow-lg">Sign In</button>
            </div>
            
            <div class="mt-6 flex items-center justify-center space-x-2">
                <span class="h-px w-full bg-gray-200"></span>
                <span class="text-gray-400 text-sm font-medium uppercase">Or</span>
                <span class="h-px w-full bg-gray-200"></span>
            </div>

            <div class="mt-6 space-y-3">
                <button id="btn-google-login" class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                    <span class="text-gray-700 font-medium">Continue with Google</span>
                </button>
                <button id="btn-gc-login" class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition">
                    <i class="fa-brands fa-apple text-xl"></i>
                    <span class="text-gray-700 font-medium">Game Center</span>
                </button>
            </div>

            <p class="mt-8 text-center text-gray-600 text-sm">
                New to NextGenAdi4U? <button onclick="toggleForms()" class="text-gold font-semibold hover:underline">Create Account</button>
            </p>
        </div>

        <div id="register-form" class="form-container hidden-form">
            <h2 class="text-xl font-semibold mb-6 text-gray-700">Create Premium Account</h2>
            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-4 text-sm text-yellow-800 text-center">
                <i class="fa-solid fa-gift mr-1 text-gold"></i> Sign up now & get <strong>5000 Credits</strong> free!
            </div>
            <div class="space-y-4">
                <div>
                    <input type="text" id="reg-username" placeholder="Username" class="input-field w-full px-4 py-3 rounded-lg bg-gray-50">
                </div>
                <div>
                    <input type="email" id="reg-email" placeholder="Email Address" class="input-field w-full px-4 py-3 rounded-lg bg-gray-50">
                </div>
                <div>
                    <input type="password" id="reg-password" placeholder="Password" class="input-field w-full px-4 py-3 rounded-lg bg-gray-50">
                </div>
                <button id="btn-register" class="btn-gold w-full py-3 rounded-lg font-semibold text-lg mt-2 shadow-lg">Sign Up</button>
            </div>

            <p class="mt-8 text-center text-gray-600 text-sm">
                Already have an account? <button onclick="toggleForms()" class="text-gold font-semibold hover:underline">Sign In</button>
            </p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, OAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Tuzha Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD9s-ys9UlaIl9m_h9_7N28q5-kQ4LzS5Y",
            authDomain: "digital-9a872.firebaseapp.com",
            projectId: "digital-9a872",
            storageBucket: "digital-9a872.firebasestorage.app",
            messagingSenderId: "878552810082",
            appId: "1:878552810082:web:d7811b6eebd13b6c45873b",
            measurementId: "G-N4TG60G2RQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Custom Toast System ---
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('custom-toast-container');
            const toast = document.createElement('div');
            toast.className = `custom-toast ${type === 'error' ? 'toast-error' : 'toast-success'}`;
            
            const icon = type === 'error' ? '<i class="fa-solid fa-circle-exclamation text-red-500 text-xl"></i>' : '<i class="fa-solid fa-circle-check text-green-500 text-xl"></i>';
            toast.innerHTML = `${icon} <div><p class="text-sm font-medium text-gray-800">${message}</p></div>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.4s forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // --- Form Toggle Logic ---
        window.toggleForms = function() {
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            if (loginForm.classList.contains('hidden-form')) {
                loginForm.classList.remove('hidden-form');
                regForm.classList.add('hidden-form');
            } else {
                loginForm.classList.add('hidden-form');
                regForm.classList.remove('hidden-form');
            }
        }

        // --- Registration Logic with 5000 Credits ---
        document.getElementById('btn-register').addEventListener('click', async () => {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const username = document.getElementById('reg-username').value;

            if(!email || !password || !username) return showToast('Please fill all fields!', 'error');

            try {
                showToast('Creating account...', 'success');
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Add 5000 credits to Firestore Database
                await setDoc(doc(db, "users", user.uid), {
                    username: username,
                    email: email,
                    credits: 5000,
                    createdAt: new Date().toISOString()
                });

                showToast('Account created! 5000 Credits added.', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);

            } catch (error) {
                showToast(error.message, 'error');
            }
        });

        // --- Login Logic ---
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            if(!email || !password) return showToast('Enter email and password!', 'error');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('Login successful!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                showToast('Invalid email or password.', 'error');
            }
        });

        // --- Google Login Logic ---
        document.getElementById('btn-google-login').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // Check if new user to give credits
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, "users", user.uid), {
                        username: user.displayName || 'Google User',
                        email: user.email,
                        credits: 5000,
                        createdAt: new Date().toISOString()
                    });
                    showToast('Welcome! 5000 Credits added.', 'success');
                } else {
                    showToast('Login successful!', 'success');
                }
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                showToast(error.message, 'error');
            }
        });

        // --- Game Center Login Logic ---
        document.getElementById('btn-gc-login').addEventListener('click', async () => {
            const provider = new OAuthProvider('gc.apple.com');
            try {
                const result = await signInWithPopup(auth, provider);
                // Note: You need to configure Game Center in Apple Developer Portal & Firebase Console for this to work perfectly.
                showToast('Game Center login successful!', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                showToast('Game Center Error: Make sure it is enabled in Firebase Console.', 'error');
            }
        });

        // --- Forgot Password Logic ---
        window.handleForgotPassword = async function() {
            const email = document.getElementById('login-email').value;
            if(!email) {
                showToast('Please enter your email address first!', 'error');
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                showToast('Password reset link sent to your email!', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
    </script>
</body>
</html>
