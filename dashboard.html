<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NextGenAdi4U</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #fdfbfb;
            color: #333;
            overflow-x: hidden;
        }

        /* Golden & White Theme Elements */
        .text-gold { color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; }
        .border-gold { border-color: #D4AF37; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .premium-card {
            background: #fff;
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        
        .premium-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15);
        }

        .btn-gold {
            background: linear-gradient(45deg, #D4AF37, #FFDF73);
            color: #fff;
            transition: all 0.3s ease;
        }
        .btn-gold:hover {
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        /* Dropdown Animation */
        .dropdown-menu {
            display: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        .dropdown-menu.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Toast System */
        #custom-toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .custom-toast {
            background: #fff;
            border-left: 4px solid #D4AF37;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 12px;
            animation: slideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(100%); } }
    </style>
</head>
<body class="bg-gray-50">

    <div id="custom-toast-container"></div>

    <nav class="glass-nav fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer">
                    <h1 class="text-2xl font-bold text-gray-800 tracking-tight">NextGen<span class="text-gold">Adi4U</span></h1>
                </div>

                <div class="flex items-center space-x-6">
                    <div class="hidden sm:flex items-center bg-yellow-50 border border-yellow-200 px-4 py-2 rounded-full">
                        <i class="fa-solid fa-coins text-gold mr-2"></i>
                        <span class="font-semibold text-gray-700" id="user-credits">Loading...</span>
                        <span class="text-gray-500 text-sm ml-1">CR</span>
                    </div>

                    <div class="relative">
                        <button id="profile-btn" class="flex items-center focus:outline-none">
                            <div class="w-10 h-10 rounded-full bg-gold text-white flex items-center justify-center font-bold shadow-md border-2 border-white">
                                <span id="user-initial">U</span>
                            </div>
                            <span class="ml-2 font-medium text-gray-700 hidden md:block" id="user-name">User</span>
                            <i class="fa-solid fa-chevron-down ml-2 text-sm text-gray-400"></i>
                        </button>

                        <div id="profile-dropdown" class="dropdown-menu absolute right-0 mt-3 w-56 bg-white rounded-xl shadow-xl border border-gray-100 py-2">
                            <div class="px-4 py-3 border-b border-gray-100 sm:hidden">
                                <p class="text-sm text-gray-500">Balance</p>
                                <p class="text-sm font-semibold text-gold"><span id="mobile-credits">0</span> CR</p>
                            </div>
                            <a href="#" onclick="actionMessage('Edit Profile feature coming soon!')" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-gold transition"><i class="fa-regular fa-user mr-2 w-5"></i> Edit Profile</a>
                            <a href="#" onclick="actionMessage('Theme Customizer coming soon!')" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-gold transition"><i class="fa-solid fa-palette mr-2 w-5"></i> Customize Theme</a>
                            <a href="#" onclick="actionMessage('Security Settings opening...')" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-gold transition"><i class="fa-solid fa-shield-halved mr-2 w-5"></i> Security</a>
                            <a href="#" onclick="actionMessage('Share your code to get 500 Credits!')" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-gold transition"><i class="fa-solid fa-users-viewfinder mr-2 w-5"></i> Refer & Earn</a>
                            <div class="border-t border-gray-100 mt-2 pt-2">
                                <button id="btn-logout" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition"><i class="fa-solid fa-arrow-right-from-bracket mr-2 w-5"></i> Logout</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="pt-28 pb-10 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto text-center">
        <h2 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">Unlock Premium Digital Assets</h2>
        <p class="text-gray-500 max-w-2xl mx-auto text-lg">Use your credits to unlock high-quality tools, source codes, and exclusive content directly from the NextGenAdi4U vault.</p>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="cards-container">
            </div>
    </div>

    <footer class="bg-white border-t border-gray-200 mt-12 py-8 text-center">
        <p class="text-gray-500 text-sm">© 2026 NextGenAdi4U. All rights reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Same Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD9s-ys9UlaIl9m_h9_7N28q5-kQ4LzS5Y",
            authDomain: "digital-9a872.firebaseapp.com",
            projectId: "digital-9a872",
            storageBucket: "digital-9a872.firebasestorage.app",
            messagingSenderId: "878552810082",
            appId: "1:878552810082:web:d7811b6eebd13b6c45873b",
            measurementId: "G-N4TG60G2RQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Toast System (Global)
        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('custom-toast-container');
            const toast = document.createElement('div');
            toast.className = `custom-toast border-l-4 ${type === 'error' ? 'border-red-500' : 'border-gold'}`;
            const icon = type === 'error' ? '<i class="fa-solid fa-circle-exclamation text-red-500 text-xl"></i>' : '<i class="fa-solid fa-circle-check text-gold text-xl"></i>';
            toast.innerHTML = `${icon} <div><p class="text-sm font-medium text-gray-800">${message}</p></div>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.4s forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        window.actionMessage = function(msg) {
            showToast(msg, 'success');
            document.getElementById('profile-dropdown').classList.remove('show');
        }

        // Dropdown Toggle
        document.getElementById('profile-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('profile-dropdown').classList.toggle('show');
        });
        document.addEventListener('click', () => {
            document.getElementById('profile-dropdown').classList.remove('show');
        });

        // Authentication & User Data Fetching
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // User is signed in, fetch data from Firestore
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const userData = userDoc.data();
                        
                        // Update UI with User Data
                        const displayName = userData.username || user.displayName || user.email.split('@')[0];
                        document.getElementById('user-name').innerText = displayName;
                        document.getElementById('user-initial').innerText = displayName.charAt(0).toUpperCase();
                        
                        document.getElementById('user-credits').innerText = userData.credits || 0;
                        document.getElementById('mobile-credits').innerText = userData.credits || 0;
                        
                        showToast(`Welcome back, ${displayName}!`);
                    } else {
                        // Fallback if document doesn't exist
                        document.getElementById('user-name').innerText = user.email.split('@')[0];
                        document.getElementById('user-credits').innerText = "0";
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                    showToast("Failed to load user data.", 'error');
                }
            } else {
                // User is not signed in, redirect to login
                window.location.href = "index.html";
            }
        });

        // Logout Logic
        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            }).catch((error) => {
                showToast(error.message, 'error');
            });
        });

        // Render 10 Cards Dynamically
        const cardsContainer = document.getElementById('cards-container');
        const cardData = [
            { title: "Premium App UI Kit", price: 500, icon: "fa-mobile-screen-button" },
            { title: "E-Commerce Script", price: 1200, icon: "fa-cart-shopping" },
            { title: "Admin Dashboard Template", price: 800, icon: "fa-chart-pie" },
            { title: "Vector Graphics Bundle", price: 300, icon: "fa-pen-nib" },
            { title: "SEO Tool Source Code", price: 2000, icon: "fa-magnifying-glass-chart" },
            { title: "Animation Presets", price: 400, icon: "fa-film" },
            { title: "Music Streaming Clone", price: 2500, icon: "fa-music" },
            { title: "Cyber Security E-Book", price: 150, icon: "fa-book-shield" },
            { title: "3D Icon Pack", price: 350, icon: "fa-cube" },
            { title: "Ultimate Font Collection", price: 200, icon: "fa-font" }
        ];

        cardData.forEach((card, index) => {
            const cardHTML = `
                <div class="premium-card p-5 flex flex-col justify-between h-full">
                    <div>
                        <div class="w-12 h-12 rounded-lg bg-yellow-50 flex items-center justify-center mb-4 border border-yellow-100">
                            <i class="fa-solid ${card.icon} text-2xl text-gold"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2">${card.title}</h3>
                        <p class="text-sm text-gray-500 mb-4">Download the full source files and documentation for immediate use.</p>
                    </div>
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-100">
                        <span class="font-bold text-gray-700"><i class="fa-solid fa-coins text-gold text-sm mr-1"></i>${card.price}</span>
                        <button onclick="window.location.href='product_${index+1}.html'" class="btn-gold px-4 py-2 rounded-lg text-sm font-medium">Explore</button>
                    </div>
                </div>
            `;
            cardsContainer.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
